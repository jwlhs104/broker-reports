<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALYST — 券商報告研究終端</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="grain-overlay"></div>

    <div id="app">
        <!-- 手機版側邊欄遮罩 -->
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <!-- 側邊欄：歷史對話 -->
        <aside id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-mark">A</div>
                <div class="brand-text">
                    <span class="brand-name">ANALYST</span>
                    <span class="brand-sub">Research Terminal</span>
                </div>
                <span id="stats-badge" class="stats-badge"></span>
                <button id="sidebar-close" class="sidebar-close-btn" title="關閉側邊欄">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="sidebar-actions">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新對話
                </button>
            </div>

            <div class="sidebar-section-label">歷史對話</div>

            <div id="conversation-list" class="conversation-list">
                <!-- 動態填入 -->
            </div>
        </aside>

        <!-- 主聊天區 -->
        <main id="chat-area">
            <div class="chat-header">
                <button id="toggle-sidebar" class="icon-btn" title="切換側邊欄">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
                </button>
                <div class="header-title-group">
                    <h1>Research <em>Assistant</em></h1>
                    <div class="header-divider"></div>
                </div>
                <div class="stock-filter">
                    <label for="stock-filter">FILTER</label>
                    <input type="text" id="stock-filter" placeholder="股票代碼">
                </div>
            </div>

            <div id="messages" class="messages">
                <!-- welcome 由 JS 注入 -->
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <textarea id="user-input" placeholder="輸入你的研究問題..." rows="1"></textarea>
                    <button id="send-btn" title="送出">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">Enter 送出 · Shift+Enter 換行</div>
            </div>
        </main>
    </div>

    <!-- Hover 彈出卡片 -->
    <div id="source-popover" class="source-popover hidden">
        <div class="popover-accent-line"></div>
        <div class="popover-header">
            <span class="popover-broker"></span>
            <span class="popover-date"></span>
        </div>
        <div class="popover-meta">
            <span class="popover-stock"></span>
            <span class="popover-rating"></span>
            <span class="popover-tp"></span>
        </div>
        <div class="popover-excerpt"></div>
        <div class="popover-footer">
            <a href="#" class="popover-detail-link">
                查看完整報告
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
