paths:
  reports_dir: "./reports"
  db_url: "sqlite:///reports.db"

llm:
  claude_model: "claude-sonnet-4-20250514"

extraction:
  max_pages: 10          # 擷取前 N 頁送 LLM
  batch_size: 5          # 每批處理幾份報告

# Dropbox 同步設定
dropbox:
  remote: "dropbox"                # rclone remote 名稱
  remote_path: "/券商報告"           # Dropbox 上的資料夾路徑
  # 排除的檔案模式 (rclone --exclude)
  excludes:
    - "*.tmp"
    - ".DS_Store"
    - "~$*"                        # Office 暫存檔

# tg-archiver 同步與監控設定
tg_archiver:
  db_path: "/Users/jimquant/Desktop/workspace/tg-archiver/data/archiver.db"
  media_dir: "/Users/jimquant/Desktop/workspace/tg-archiver/data/media"
  bot_token: ""    # ← 填入你的 Telegram Bot Token
  notify_chat_id: 0    # ← 填入你的 Telegram User ID (用 @userinfobot 查詢)
